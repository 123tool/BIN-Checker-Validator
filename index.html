<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIN Checker & Validator | 123TOOL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --danger: #ff4d4d;
            --success: #2ecc71;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
        }

        header { text-align: center; margin-bottom: 40px; }
        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 3px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-sub { font-size: 0.6rem; letter-spacing: 5px; color: #666; margin-top: 5px; text-transform: uppercase; }

        .input-group { margin-bottom: 25px; position: relative; }
        label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 10px; letter-spacing: 1px; }
        
        input {
            width: 100%;
            padding: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: #fff;
            outline: none;
            font-size: 1.2rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }

        /* Hasil Analisis */
        .analysis-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            display: none; /* Muncul saat ada input */
            border: 1px solid var(--glass-border);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; }
        .data-label { color: #666; }
        .data-value { font-weight: bold; color: #ccc; }
        .status-valid { color: var(--success); }
        .status-invalid { color: var(--danger); }

        .btn-check {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-check:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2); }

        footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.6rem;
            color: #444;
            letter-spacing: 2px;
            text-align: center;
            width: 100%;
        }

        /* Ikon Jenis Kartu */
        .card-type-icon {
            position: absolute;
            right: 20px;
            top: 45px;
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>FINANCIAL INTEL</h1>
            <div class="brand-sub">BIN Checker & Luhn Validator</div>
        </header>

        <div class="input-group">
            <label for="ccInput">ENTER CARD NUMBER (MIN. 6 DIGITS)</label>
            <input type="text" id="ccInput" placeholder="4560 0000 0000 0000" maxlength="19">
            <div id="cardBrand" class="card-type-icon"></div>
        </div>

        <div id="analysisResult" class="analysis-box">
            <div class="data-row">
                <span class="data-label">Luhn Check:</span>
                <span id="luhnStatus" class="data-value">--</span>
            </div>
            <div class="data-row">
                <span class="data-label">Scheme:</span>
                <span id="resScheme" class="data-value">--</span>
            </div>
            <div class="data-row">
                <span class="data-label">Type:</span>
                <span id="resType" class="data-value">--</span>
            </div>
            <div class="data-row">
                <span class="data-label">Brand/Bank:</span>
                <span id="resBank" class="data-value">--</span>
            </div>
            <div class="data-row">
                <span class="data-label">Country:</span>
                <span id="resCountry" class="data-value">--</span>
            </div>
        </div>

        <button class="btn-check" onclick="fullCheck()">ANALYZE DATA</button>
    </div>

    <footer>
        &copy; 2026 SPY-E INTELLIGENCE UNIT // 123TOOL PRO
    </footer>
<script>
    const ccInput = document.getElementById('ccInput');
    const analysisResult = document.getElementById('analysisResult');
    const cardBrand = document.getElementById('cardBrand');

    // 1. Formatter: Otomatis kasih spasi tiap 4 angka
    ccInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        let formattedValue = "";
        for (let i = 0; i < value.length; i++) {
            if (i > 0 && i % 4 === 0) formattedValue += " ";
            formattedValue += value[i];
        }
        e.target.value = formattedValue;

        // Auto-detect brand simpel
        detectSimpleBrand(value);
        
        // Jika sudah 6 digit atau lebih, tampilkan box analisis (preview)
        if (value.length >= 6) {
            analysisResult.style.display = 'block';
        } else {
            analysisResult.style.display = 'none';
        }
    });

    function detectSimpleBrand(number) {
        if (number.startsWith('4')) cardBrand.innerText = 'VISA';
        else if (number.startsWith('5')) cardBrand.innerText = 'MASTERCARD';
        else if (number.startsWith('3')) cardBrand.innerText = 'AMEX';
        else cardBrand.innerText = '';
    }

    // 2. Algorithm: Luhn Check (Validasi Matematika Kartu)
    function checkLuhn(number) {
        let sum = 0;
        let shouldDouble = false;
        for (let i = number.length - 1; i >= 0; i--) {
            let digit = parseInt(number.charAt(i));
            if (shouldDouble) {
                if ((digit *= 2) > 9) digit -= 9;
            }
            sum += digit;
            shouldDouble = !shouldDouble;
        }
        return (sum % 10) == 0;
    }

    // 3. Execution: BIN Check via Public API
    async function fullCheck() {
        const rawNumber = ccInput.value.replace(/\s+/g, '');
        if (rawNumber.length < 6) return alert('Input Minimal 6 Digit BIN, Bos!');

        // Update UI Status Luhn
        const isLuhnValid = checkLuhn(rawNumber);
        const luhnEl = document.getElementById('luhnStatus');
        luhnEl.innerText = isLuhnValid ? 'VALID (PASSED)' : 'INVALID (FAILED)';
        luhnEl.className = isLuhnValid ? 'data-value status-valid' : 'data-value status-invalid';

        // Fetch Data BIN (Menggunakan binlist.net atau sejenisnya)
        const bin = rawNumber.substring(0, 6);
        try {
            document.getElementById('resBank').innerText = 'Searching...';
            
            const response = await fetch(`https://lookup.binlist.net/${bin}`);
            if (!response.ok) throw new Error('BIN Not Found');
            
            const data = await response.json();

            // Isi Data ke UI
            document.getElementById('resScheme').innerText = (data.scheme || 'Unknown').toUpperCase();
            document.getElementById('resType').innerText = (data.type || 'Unknown').toUpperCase();
            document.getElementById('resBank').innerText = (data.bank ? data.bank.name : 'Unknown');
            document.getElementById('resCountry').innerText = (data.country ? data.country.name + ' ' + data.country.emoji : 'Unknown');
            
        } catch (error) {
            document.getElementById('resBank').innerText = 'Data Not Found';
            console.error('Error fetching BIN:', error);
        }
    }
</script>
    </body>
</html>
